; PlatformIO Project Configuration File
;
; Combat Robot v2 — NimBLE-based, no Bluepad32, no Arduino-bundled BP32.
;
; See docs/DECISIONS.md for the rationale.

[platformio]
src_dir = main

[env]
; Pinned to platform version 6.5.0 which uses ESP-IDF 5.1.x.
; Newer platform versions use ESP-IDF 5.4 which breaks the
; Arduino-as-component pattern that some libraries depend on.
; See: https://github.com/espressif/arduino-esp32/blob/master/README.md
;
; Use framework=arduino (not espidf) so Arduino is the framework
; rather than a separate component. This avoids the
; 'Failed to resolve component arduino' error we hit when
; using framework=espidf with components that require 'arduino'.
platform = espressif32@6.5.0
framework = arduino
board_build.partitions = partitions.csv
monitor_speed = 115200
monitor_filters = direct
board_build.sdkconfig_defaults = sdkconfig.defaults

; Pull in ESPAsyncWebServer for the web UI.
; Use me-no-dev fork (canonical Arduino library owner) for ESP-IDF + Arduino compatibility.
; Note: ESPAsyncWebServer's transitive WebServer dependency needs WiFi,
; but LDF doesn't always detect that. We force WiFi inclusion via
; lib_ignore and lib_extra_dirs below.
lib_deps =
    me-no-dev/ESPAsyncWebServer@^3.6.0
    me-no-dev/AsyncTCP@^3.3.2
    h2zero/NimBLE-Arduino@^1.4.2

; Force deep library dependency finder mode so transitive deps (like
; ESPAsyncWebServer -> WebServer -> WiFi) are pulled in automatically.
lib_ldf_mode = deep+

; Treat our components/ as PIO library sources. With framework=arduino,
; PIO only compiles sources from main/ and lib_deps; we need lib_extra_dirs
; to also include our custom components. Pointing at the parent 'components/'
; directory makes PIO scan all subdirs for library.json files.
lib_extra_dirs = components

; Custom component include paths. With framework=arduino, PlatformIO doesn't
; auto-detect the components/ directory (that's framework=espidf behavior),
; so we add include paths via build_flags.
extra_scripts = pre:tools/gen_web_index.py
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D CONFIG_PM_POWER_DOWN_PERIPHERAL_IN_LIGHT_SLEEP=0
    -D BOARD_REV=2
    -D BOARD_CONFIG_VERBOSE
    -I components/ble_gamepad/include
    -I components/myrobot/include
    -I components/board_config/include
    -I components/output_config/include
    -I components/web_config/include

; Tell the Library Dependency Finder to include our custom component sources.
; '+<...>' means include, '-<...>' means exclude. The default with framework=arduino
; is just main/, so we extend it to include all of our custom components.
build_src_filter = +<*> -<.git/> -<.pio/> -<tests/> -<docs/> -<hardware/> -<tools/> -<dependencies.lock>

; Primary target — ESP32-C3 DevKit M02 (BLE-only, 4MB flash)
[env:esp32-c3-devkitc-02]
board = esp32-c3-devkitc-02

[env:esp32dev]
board = esp32dev

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1

[env:esp32-c6-devkitc-1]
board = esp32-c6-devkitc-1

[env:esp32-h2-devkitm-1]
board = esp32-h2-devkitm-1