; PlatformIO Project Configuration File
;
; Combat Robot v2 — NimBLE-based, no Bluepad32, no Arduino-bundled BP32.
;
; See docs/DECISIONS.md for the rationale.

[platformio]
src_dir = main

[env]
platform = https://github.com/pioarduino/platform-espressif32.git#develop
framework = espidf
board_build.partitions = partitions.csv
monitor_speed = 115200
monitor_filters = direct
board_build.sdkconfig_defaults = sdkconfig.defaults

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D CONFIG_PM_POWER_DOWN_PERIPHERAL_IN_LIGHT_SLEEP=0
    -D BOARD_REV=2
    -D BOARD_CONFIG_VERBOSE

; Pull in ESPAsyncWebServer for the web UI.
lib_deps =
    mehlma/ESPAsyncWebServer@^3.6.0
    esphome/ESPAsyncTCP@^2.0.0
    h2eng/nimble@^1.5.0

; Primary target — ESP32-C3 DevKit M02 (BLE-only, 4MB flash)
[env:esp32-c3-devkitc-02]
board = esp32-c3-devkitc-02

[env:esp32dev]
board = esp32dev

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1

[env:esp32-c6-devkitc-1]
board = esp32-c6-devkitc-1

[env:esp32-h2-devkitm-1]
board = esp32-h2-devkitm-1