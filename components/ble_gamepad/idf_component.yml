## IDF Component Manager manifest for ble_gamepad
## Declares managed-component dependencies that PlatformIO/ESP-IDF
## will fetch automatically.
##
## IMPORTANT: We do NOT depend on a managed NimBLE component here.
## NimBLE is BUNDLED with the ESP-IDF platform (v5.x), and the NimBLE
## host API headers are available via the platform's include path:
##   #include "host/ble_hs.h"
##   #include "nimble/nimble_port.h"
##   etc.
## Trying to add a managed NimBLE dependency causes CMake to look
## for a separately-packaged component that doesn't exist in ESP-IDF
## v5.x. If you need a newer NimBLE, use the platform's bundled
## version (which is what the ESP-IDF version is compiled against).
##
## This file is intentionally left empty of dependencies to avoid the
## "espressif/nimble not found" error.