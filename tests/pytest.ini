[pytest]
testpaths = unit regression integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    hardware: marks tests that require real hardware (deselect by default)
filterwarnings =
    error
    # The fixture files legitimately use descriptive names like 'test_*'
    ignore::DeprecationWarning