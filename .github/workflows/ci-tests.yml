name: Host Tests

# Runs the pytest suite on every push and PR. This is the CI gate.
#
# Note: This does NOT build the firmware. PlatformIO build happens
# in a separate workflow (ci-build.yml) when hardware-validate is
# added. For now, host tests are the primary signal.

on:
  push:
    branches: [main, develop, combat_robot, v2/**]
  pull_request:
    branches: [main, develop, combat_robot]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run host tests
        run: |
          # Run all tests except the schematic pinout warning, which is
          # environment-specific (the schematic PDF isn't in CI). Use
          # --deselect to skip it.
          pytest tests/ -v \
            --deselect tests/integration/test_pre_flash.py::TestSchematicVsPinout \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml