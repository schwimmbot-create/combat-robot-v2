name: PlatformIO Build

# Build the firmware for all target boards. This catches compile
# errors and lets us see flash usage trends.
#
# Note: this workflow does NOT have any hardware to test on in CI.
# On-target tests will be added in a follow-up workflow when we
# set up self-hosted runners or a hardware-in-loop test rig.

on:
  push:
    branches: [main, develop, combat_robot, v2/**]
  pull_request:
    branches: [main, develop, combat_robot]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - esp32-c3-devkitc-02
          - esp32dev
          # Add more envs as needed:
          # - esp32-s3-devkitc-1
          # - esp32-c6-devkitc-1
          # - esp32-h2-devkitm-1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run host tests (gate)
        # Don't even try to build if host tests fail.
        run: |
          pip install -r tests/requirements.txt
          pytest tests/ -q \
            --deselect tests/integration/test_pre_flash.py::TestSchematicVsPinout

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      - name: Report flash usage
        # Parse the build output to get section sizes. Useful for tracking
        # flash usage over time as a regression check.
        if: always()
        run: |
          if [ -f .pio/build/${{ matrix.env }}/firmware.elf ]; then
            echo "## Flash usage for ${{ matrix.env }}" >> $GITHUB_STEP_SUMMARY
            size=$(stat -c %s .pio/build/${{ matrix.env }}/firmware.bin 2>/dev/null || echo "?")
            echo "- firmware.bin: $size bytes" >> $GITHUB_STEP_SUMMARY
            ${HOME}/.platformio/packages/toolchain-xtensa-esp32/bin/size \
              .pio/build/${{ matrix.env }}/firmware.elf 2>/dev/null || true
          fi

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/firmware.bin
          if-no-files-found: ignore